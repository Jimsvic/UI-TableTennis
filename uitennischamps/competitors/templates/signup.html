{% extends 'base.html' %}

{% block title %}Sign Up{% endblock %}

{% block content %}
<div class="container">
  <h1>Sign Up</h1>
  <form method="post" action="{% url 'signup' %}">
    {% csrf_token %}
    <br><br>
    <div>
      <label for="sur name">Sur name:</label><br>
      <input type="text" id="surname" name="surname" required class="form-control"><br>
    </div><br>
      <label for="first name">First Name:</label><br>
      <input type="text" id="firstname" name="firstname" required class="form-control">
    </div><br>
      <label for="middle name">Middle Name:</label><br>
      <input type="text" id="middlename" name="middlename" required class="form-control"><br>
    </div>
      <label for="E-maillA ddress">E-mail Address:</label>
      <input type="text" id="Email_Address" name="Email_Address" required class="form-control">
    </div><br>
      <label for="full_name_of_NOK">Full_Name_of_NOK</label>
      <input type="text" id="full_name_of_nok" name="full_name_of_nok" required class="form-control"><br>
    </div>
      <label for="phone_number">Phone_Number:</label>
      <input type="text" id="phone_number" name="phone_number" required class="form-control"><br>
    </div>
      <label for="username">Username:</label>
      <input type="text" id="username" name="username" required class="form-control"><br>
    </div>
      <label for="password">Password:</label>
      <input type="password" id="password" name="password" required class="form-control"><br>
    </div>
      <label for="confirm_password">Confirm Password:</label>
      <input type="password" id="confirm_password" name="confirm_password" required class="form-control"><br>
    </div>
    <button type="submit" class="btn btn-primary">Sign Up</button>
  </form>
  {% if messages %}
    <ul class="messages">
      {% for message in messages %}
        <li{% if message.tags %} class="{{ message.tags }}"{% endif %}>{{ message }}</li>
      {% endfor %}
    </ul>
  {% endif %}
</div>
{% endblock %}
